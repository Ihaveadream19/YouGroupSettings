name: Build YouGroupSettings

on:

  workflow_dispatch:

  push:

jobs:

  build:

    runs-on: macos-latest

    steps:

      # ─────────────────────────────

      # Checkout

      # ─────────────────────────────

      - name: Checkout

        uses: actions/checkout@v4

      # ─────────────────────────────

      # Tools

      # ─────────────────────────────

      - name: Install tools

        run: brew install make xz ldid

      # ─────────────────────────────

      # Theos

      # ─────────────────────────────

      - name: Setup Theos

        run: |

          git clone --recursive https://github.com/theos/theos.git $HOME/theos

          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # ─────────────────────────────

      # SDK

      # ─────────────────────────────

      - name: Setup SDK

        run: |

          rm -rf $HOME/theos/sdks

          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # ─────────────────────────────

      # PSHeader

      # ─────────────────────────────

      - name: Setup PSHeader

        run: |

          git clone https://github.com/Ihaveadream19/PSHeader.git

          mkdir -p $THEOS/include/PSHeader

          cp -R PSHeader/* $THEOS/include/PSHeader/

      # ─────────────────────────────

      # YouTubeHeader

      # ─────────────────────────────

      - name: Setup YouTubeHeader

        run: |

          git clone https://github.com/PoomSmart/YouTubeHeader.git

          mkdir -p $THEOS/include/YouTubeHeader

          cp -R YouTubeHeader/* $THEOS/include/YouTubeHeader/

      # ─────────────────────────────

      # Build

      # ─────────────────────────────

      - name: Build tweak

        run: |

          make clean || true

          make package FINALPACKAGE=1

      # ─────────────────────────────

      # Collect dylib

      # ─────────────────────────────

      - name: Collect dylib

        run: |

          mkdir -p output

          find .theos -name "*.dylib" -exec cp {} output/ \;

      # ─────────────────────────────

      # Create bundle (FIXED)

      # ─────────────────────────────

      - name: Create bundle

        run: |

          mkdir -p output/YouGroupSettings.bundle

          cat > output/YouGroupSettings.bundle/Info.plist <<EOF

          {

            CFBundleDevelopmentRegion = en;

            CFBundleExecutable = YouGroupSettings;

            CFBundleIdentifier = com.yougroupsettings.bundle;

            CFBundleInfoDictionaryVersion = 6.0;

            CFBundleName = YouGroupSettings;

            CFBundlePackageType = BNDL;

            CFBundleShortVersionString = 1.0;

            CFBundleVersion = 1.0;

            NSPrincipalClass = NSObject;

          }

          EOF

          mkdir -p output/YouGroupSettings.bundle/en.lproj

          echo '"TWEAKS" = "Tweaks";' > output/YouGroupSettings.bundle/en.lproj/Localizable.strings

      # ─────────────────────────────

      # Create tweak plist (WICHTIG)

      # ─────────────────────────────

      - name: Create tweak plist

        run: |

          cat > output/YouGroupSettings.plist <<EOF

          {

            Filter = {

              Bundles = ( "com.google.ios.youtube" );

            };

          }

          EOF

      # ─────────────────────────────

      # Upload

      # ─────────────────────────────

      - name: Upload final files

        uses: actions/upload-artifact@v4

        with:

          name: YouGroupSettings

          path: output/
